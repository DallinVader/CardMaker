<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Grid</title>
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .grid-item {
            width: 100%;
            height: 100px;
            border: 1px solid #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <h1>Upload Your Cards</h1>
    <input type="file" id="fileUpload" accept="image/*" multiple>
    <button id="downloadBtn">Download as PDF</button>
    <div class="grid-container" id="gridContainer"></div>

    <script>
        const fileUpload = document.getElementById('fileUpload');
        const gridContainer = document.getElementById('gridContainer');
        const downloadBtn = document.getElementById('downloadBtn');

        fileUpload.addEventListener('change', handleFiles);

        function handleFiles() {
            const files = this.files;
            gridContainer.innerHTML = '';
            for (let i = 0; i < files.length && i < 9; i++) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const gridItem = document.createElement('div');
                    gridItem.classList.add('grid-item');
                    gridItem.style.backgroundImage = `url(${e.target.result})`;
                    gridItem.style.backgroundSize = 'cover';
                    gridItem.style.backgroundPosition = 'center';
                    gridContainer.appendChild(gridItem);
                };
                reader.readAsDataURL(files[i]);
            }
        }

        downloadBtn.addEventListener('click', function() {
            // PDF download functionality to be implemented
            alert('PDF download functionality not implemented yet.');
        });
    </script>
</body>
</html>
