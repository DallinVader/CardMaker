<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Grid – Print 9 Cards</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 1rem;
            background: #f0f0f0;
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto auto 1fr;
            justify-items: center;
        }
        h1 { margin-top: 0; }
        .controls {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .controls label {
            padding: 0.5rem 1rem;
            background: #333;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
        }
        .controls input[type="file"] { display: none; }
        .controls button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .btn-print { background: #2c7; color: #fff; }
        .btn-pdf { background: #07c; color: #fff; }
        .btn-print:hover, .btn-pdf:hover { opacity: 0.9; }
        .btn-back {
            background: #1a202c;
            color: #fff;
        }
        .btn-back::before {
            content: '←';
            font-size: 1.1rem;
        }
        .btn-back:hover { opacity: 0.9; }
        .btn-repeat {
            background: #5b4;
            color: #fff;
        }
        .btn-repeat:hover { opacity: 0.9; }
        .btn-repeat:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .btn-bleed {
            background: #b8860b;
            color: #fff;
            border: 2px solid rgba(255,255,255,0.35);
        }
        .btn-bleed[aria-pressed="false"] {
            background: #555;
            border-color: rgba(255,255,255,0.2);
        }
        .btn-bleed:hover { opacity: 0.92; }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            background: #fff;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 100%;
            align-self: center;
        }
        .grid-item {
            aspect-ratio: 2.5 / 3.5;
            border: 1px solid #ccc;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #eee;
            background-position: center;
        }
        /* 2.75×3.75" Card Maker PNG: crop to 2.5×3.5" trim */
        .grid-container.trim-bleed .grid-item {
            background-size: 110% auto;
        }
        .grid-container.no-bleed .grid-item {
            background-size: cover;
        }
        .grid-item.empty::before {
            content: 'Card ' attr(data-index);
            color: #999;
            font-size: 0.9rem;
        }
        .no-print { margin-bottom: 0.5rem; }

        @media print {
            @page {
                size: letter;
                margin: 0; /* let cards fill the page edge-to-edge */
            }
            html, body {
                margin: 0;
                padding: 0;
                background: #fff;
                max-width: none;
                min-height: 11in;
                height: 100%;
            }
            body {
                padding: 0 !important;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                min-height: 11in;
            }
            .no-print { display: none !important; }
            .grid-container {
                gap: 0;
                padding: 0;
                margin: 0;
                box-shadow: none;
                border-radius: 0;
                width: 7.5in;
                height: 10.5in;
                flex-shrink: 0;
                align-self: center;
                grid-template-columns: repeat(3, 2.5in);
                grid-template-rows: repeat(3, 3.5in);
            }
            .grid-item {
                width: 2.5in;
                height: 3.5in;
                margin: 0;
                border: none;
                border-radius: 0;
                background-position: center;
                overflow: hidden;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .grid-container.trim-bleed .grid-item {
                background-size: 110% auto;
            }
            .grid-container.no-bleed .grid-item {
                background-size: cover;
            }
        }
    </style>
</head>
<body>
    <h1 class="no-print">Upload 9 Cards</h1>
    <div class="controls no-print">
        <label for="fileUpload">Choose images (up to 9)</label>
        <input type="file" id="fileUpload" accept="image/*" multiple>
        <button type="button" class="btn-bleed" id="bleedToggleBtn" aria-pressed="true" title="Turn on if images are Card Maker exports with black bleed (2.75×3.75). Turn off for trim-only PNGs.">Bleed: yes</button>
        <button type="button" class="btn-print" id="printBtn">Print / Save as PDF</button>
        <button type="button" class="btn-pdf" id="downloadPdfBtn">Download PDF</button>
        <button type="button" class="btn-repeat" id="repeatBtn" disabled title="Fill all 9 slots by cycling your uploaded images">Repeat</button>
        <button type="button" class="btn-back" onclick="window.location.href='index.html'">Back to Card Maker</button>
    </div>
    <div class="grid-container" id="gridContainer"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        const fileUpload = document.getElementById('fileUpload');
        const gridContainer = document.getElementById('gridContainer');
        const printBtn = document.getElementById('printBtn');
        const downloadPdfBtn = document.getElementById('downloadPdfBtn');
        const repeatBtn = document.getElementById('repeatBtn');
        const bleedToggleBtn = document.getElementById('bleedToggleBtn');
        const SLOTS = 9;

        /** Match Card Maker export: trim/bleed crop vs full fit for trim-only images */
        let cardHasBleed = true;

        /** @type {string[]} data URLs from the last file selection (order preserved) */
        let uploadedUrls = [];

        function syncBleedMode() {
            gridContainer.classList.remove('trim-bleed', 'no-bleed');
            gridContainer.classList.add(cardHasBleed ? 'trim-bleed' : 'no-bleed');
            if (bleedToggleBtn) {
                bleedToggleBtn.setAttribute('aria-pressed', cardHasBleed ? 'true' : 'false');
                bleedToggleBtn.textContent = cardHasBleed ? 'Bleed: yes' : 'Bleed: no';
            }
        }

        function getCardBackgroundSizeForCapture() {
            return cardHasBleed ? '110% auto' : 'cover';
        }

        function readFileAsDataURL(file) {
            return new Promise(function (resolve, reject) {
                const reader = new FileReader();
                reader.onload = function () { resolve(reader.result); };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function setGridFromUrls(urls, repeat) {
            const items = gridContainer.querySelectorAll('.grid-item');
            for (let i = 0; i < SLOTS; i++) {
                const item = items[i];
                if (repeat) {
                    const url = urls[i % urls.length];
                    item.classList.remove('empty');
                    item.style.backgroundImage = `url(${url})`;
                } else if (i < urls.length) {
                    item.classList.remove('empty');
                    item.style.backgroundImage = `url(${urls[i]})`;
                } else {
                    item.classList.add('empty');
                    item.style.backgroundImage = '';
                }
            }
        }

        function ensureSlots() {
            const current = gridContainer.querySelectorAll('.grid-item').length;
            gridContainer.innerHTML = '';
            for (let i = 0; i < SLOTS; i++) {
                const div = document.createElement('div');
                div.className = 'grid-item empty';
                div.dataset.index = i + 1;
                gridContainer.appendChild(div);
            }
        }

        ensureSlots();
        syncBleedMode();

        bleedToggleBtn.addEventListener('click', function () {
            cardHasBleed = !cardHasBleed;
            syncBleedMode();
        });

        fileUpload.addEventListener('change', function () {
            const files = Array.from(this.files).slice(0, SLOTS);
            if (files.length === 0) {
                uploadedUrls = [];
                repeatBtn.disabled = true;
                return;
            }
            Promise.all(files.map(readFileAsDataURL)).then(function (urls) {
                uploadedUrls = urls;
                repeatBtn.disabled = false;
                setGridFromUrls(uploadedUrls, false);
            }).catch(function () {
                uploadedUrls = [];
                repeatBtn.disabled = true;
                alert('Could not read one or more files.');
            });
        });

        repeatBtn.addEventListener('click', function () {
            if (uploadedUrls.length === 0) {
                alert('Upload at least one image first.');
                return;
            }
            setGridFromUrls(uploadedUrls, true);
        });

        printBtn.addEventListener('click', function () {
            window.print();
        });

        downloadPdfBtn.addEventListener('click', function () {
            const items = gridContainer.querySelectorAll('.grid-item');
            const hasAny = Array.from(items).some(el => el.style.backgroundImage && el.style.backgroundImage !== 'none');
            if (!hasAny) {
                alert('Upload at least one card image first.');
                return;
            }
            downloadPdfBtn.disabled = true;
            downloadPdfBtn.textContent = 'Creating PDF…';

            const CARD_W_IN = 2.5;
            const CARD_H_IN = 3.5;
            const COLS = 3;
            const ROWS = 3;
            const MARGIN_X = 0.5;
            const MARGIN_Y = 0.25;

            var DPI = 400;
            function captureCard(el) {
                var w = Math.round(CARD_W_IN * DPI);
                var h = Math.round(CARD_H_IN * DPI);
                var scale = 2;
                var wrap = document.createElement('div');
                wrap.style.cssText = 'position:absolute;left:-9999px;width:' + w + 'px;height:' + h + 'px;overflow:hidden;';
                var clone = el.cloneNode(true);
                clone.style.width = w + 'px';
                clone.style.height = h + 'px';
                clone.style.backgroundSize = getCardBackgroundSizeForCapture();
                clone.style.backgroundPosition = 'center';
                clone.style.overflow = 'hidden';
                clone.style.borderRadius = '0';
                wrap.appendChild(clone);
                document.body.appendChild(wrap);
                return html2canvas(clone, {
                    scale: scale,
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: '#ffffff',
                    logging: false,
                    width: w,
                    height: h
                }).then(function (canvas) {
                    document.body.removeChild(wrap);
                    return canvas.toDataURL('image/png');
                });
            }

            const promises = Array.from(items).map(captureCard);
            Promise.all(promises).then(function (images) {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: 'portrait',
                    unit: 'in',
                    format: 'letter'
                });
                for (let i = 0; i < images.length; i++) {
                    const col = i % COLS;
                    const row = Math.floor(i / COLS);
                    const x = MARGIN_X + col * CARD_W_IN;
                    const y = MARGIN_Y + row * CARD_H_IN;
                    pdf.addImage(images[i], 'PNG', x, y, CARD_W_IN, CARD_H_IN);
                }
                pdf.save('card-grid.pdf');
                downloadPdfBtn.disabled = false;
                downloadPdfBtn.textContent = 'Download PDF';
            }).catch(function () {
                alert('Could not create PDF. Try "Print / Save as PDF" instead.');
                downloadPdfBtn.disabled = false;
                downloadPdfBtn.textContent = 'Download PDF';
            });
        });
    </script>
</body>
</html>
