<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Upload Grid</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 960px;
        }
        .grid img {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <h1>Upload Images</h1>
    <form id="upload-form">
        <div class="grid">
            <input type="file" accept="image/*" id="img1" required>
            <input type="file" accept="image/*" id="img2" required>
            <input type="file" accept="image/*" id="img3" required>
            <input type="file" accept="image/*" id="img4" required>
            <input type="file" accept="image/*" id="img5" required>
            <input type="file" accept="image/*" id="img6" required>
            <input type="file" accept="image/*" id="img7" required>
            <input type="file" accept="image/*" id="img8" required>
            <input type="file" accept="image/*" id="img9" required>
        </div>
        <button type="submit">Download PDF</button>
    </form>
    <script>
        document.getElementById('upload-form').addEventListener('submit', function(event) {
            event.preventDefault();
            // Logic to handle image processing and PDF generation goes here.
        });
    </script>
</body>
</html>
