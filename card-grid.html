<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Grid – Print 9 Cards</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 1rem;
            background: #f0f0f0;
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto auto 1fr;
            justify-items: center;
        }
        h1 { margin-top: 0; }
        .controls {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .size-controls {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.55rem;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        .size-controls input[type="number"] {
            width: 5.5rem;
            padding: 0.35rem 0.4rem;
            border: 1px solid #aaa;
            border-radius: 4px;
        }
        .size-controls select {
            padding: 0.35rem 0.4rem;
            border: 1px solid #aaa;
            border-radius: 4px;
            background: #fff;
        }
        .fit-note {
            font-size: 0.85rem;
            color: #333;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 0.35rem 0.55rem;
        }
        .controls label {
            padding: 0.5rem 1rem;
            background: #333;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
        }
        .controls input[type="file"] { display: none; }
        .controls button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .btn-print { background: #2c7; color: #fff; }
        .btn-pdf { background: #07c; color: #fff; }
        .btn-print:hover, .btn-pdf:hover { opacity: 0.9; }
        .btn-back {
            background: #1a202c;
            color: #fff;
        }
        .btn-back::before {
            content: '←';
            font-size: 1.1rem;
        }
        .btn-back:hover { opacity: 0.9; }
        .btn-repeat {
            background: #5b4;
            color: #fff;
        }
        .btn-repeat:hover { opacity: 0.9; }
        .btn-repeat:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .btn-bleed {
            background: #b8860b;
            color: #fff;
            border: 2px solid rgba(255,255,255,0.35);
        }
        .btn-bleed[aria-pressed="false"] {
            background: #555;
            border-color: rgba(255,255,255,0.2);
        }
        .btn-bleed:hover { opacity: 0.92; }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            background: #fff;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 100%;
            align-self: center;
        }
        .grid-item {
            aspect-ratio: var(--card-ratio, 2.5 / 3.5);
            border: 1px solid #ccc;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #eee;
            background-position: center;
        }
        /* 2.75×3.75" Card Maker PNG: crop to 2.5×3.5" trim */
        .grid-container.trim-bleed .grid-item {
            background-size: 110% auto;
        }
        .grid-container.no-bleed .grid-item {
            background-size: cover;
        }
        .grid-item.empty::before {
            content: 'Card ' attr(data-index);
            color: #999;
            font-size: 0.9rem;
        }
        .no-print { margin-bottom: 0.5rem; }

        @media print {
            @page {
                size: letter;
                margin: 0; /* let cards fill the page edge-to-edge */
            }
            html, body {
                margin: 0;
                padding: 0;
                background: #fff;
                max-width: none;
                min-height: 11in;
                height: 100%;
            }
            body {
                padding: 0 !important;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                min-height: 11in;
            }
            .no-print { display: none !important; }
            .grid-container {
                gap: 0;
                padding: 0;
                margin: 0;
                box-shadow: none;
                border-radius: 0;
                width: calc(var(--print-cols, 3) * var(--card-w, 2.5in));
                flex-shrink: 0;
                align-self: center;
                grid-template-columns: repeat(var(--print-cols, 3), var(--card-w, 2.5in));
                grid-auto-rows: var(--card-h, 3.5in);
            }
            .grid-item {
                width: var(--card-w, 2.5in);
                height: var(--card-h, 3.5in);
                margin: 0;
                border: none;
                border-radius: 0;
                background-position: center;
                overflow: hidden;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .grid-item.page-break {
                break-after: page;
                page-break-after: always;
            }
            .grid-container.trim-bleed .grid-item {
                background-size: 110% auto;
            }
            .grid-container.no-bleed .grid-item {
                background-size: cover;
            }
        }
    </style>
</head>
<body>
    <h1 class="no-print">Upload 9 Cards</h1>
    <div class="controls no-print">
        <label for="fileUpload">Choose images (up to 9)</label>
        <input type="file" id="fileUpload" accept="image/*" multiple>
        <div class="size-controls" title="Set exact printed card size in inches">
            <label for="sizePreset">Card size:</label>
            <select id="sizePreset">
                <option value="custom">Custom</option>
                <option value="2.5x3.5" selected>2.5 x 3.5 in (Poker)</option>
                <option value="2.62x3.62">Poker With Bleed (2.62 x 3.62 in)</option>
                <option value="2.75x3.75">2.75 x 3.75 in</option>
                <option value="3x4">3 x 4 in</option>
                <option value="3.5x5">3.5 x 5 in</option>
            </select>
            <input type="number" id="cardWidthIn" step="0.01" min="1" max="8" value="2.5" aria-label="Card width in inches">
            <span>x</span>
            <input type="number" id="cardHeightIn" step="0.01" min="1" max="10" value="3.5" aria-label="Card height in inches">
            <span>in</span>
        </div>
        <div class="fit-note" id="fitInfo" aria-live="polite"></div>
        <button type="button" class="btn-bleed" id="bleedToggleBtn" aria-pressed="true" title="Turn on if images are Card Maker exports with black bleed (2.75×3.75). Turn off for trim-only PNGs.">Bleed: yes</button>
        <button type="button" class="btn-print" id="printBtn">Print / Save as PDF</button>
        <button type="button" class="btn-pdf" id="downloadPdfBtn">Print-Ready PDF</button>
        <button type="button" class="btn-repeat" id="repeatBtn" disabled title="Fill all 9 slots by cycling your uploaded images">Repeat</button>
        <label style="background:#fff;color:#222;border:1px solid #bbb;padding:0.42rem 0.6rem;">
            <input type="checkbox" id="duplexBacksToggle" checked> Include duplex backs
        </label>
        <button type="button" class="btn-back" onclick="window.location.href='index.html'">Back to Card Maker</button>
    </div>
    <div class="grid-container" id="gridContainer"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        const fileUpload = document.getElementById('fileUpload');
        const gridContainer = document.getElementById('gridContainer');
        const printBtn = document.getElementById('printBtn');
        const downloadPdfBtn = document.getElementById('downloadPdfBtn');
        const repeatBtn = document.getElementById('repeatBtn');
        const bleedToggleBtn = document.getElementById('bleedToggleBtn');
        const sizePreset = document.getElementById('sizePreset');
        const cardWidthInInput = document.getElementById('cardWidthIn');
        const cardHeightInInput = document.getElementById('cardHeightIn');
        const fitInfo = document.getElementById('fitInfo');
        const duplexBacksToggle = document.getElementById('duplexBacksToggle');
        const SLOTS = 9;
        const PAGE_W_IN = 8.5;
        const PAGE_H_IN = 11;
        // Keep margins at zero to maximize one-page fit.
        const MARGIN_X = 0;
        const MARGIN_Y = 0;
        const PRINTABLE_W_IN = PAGE_W_IN - (MARGIN_X * 2);
        const PRINTABLE_H_IN = PAGE_H_IN - (MARGIN_Y * 2);

        /** Match Card Maker export: trim/bleed crop vs full fit for trim-only images */
        let cardHasBleed = true;

        /** @type {string[]} data URLs from the last file selection (order preserved) */
        let uploadedUrls = [];
        let cardWidthIn = 2.5;
        let cardHeightIn = 3.5;
        let printableLayout = { cols: 3, rows: 3, cardsPerPage: 9 };

        function getNumericInputValue(inputEl, fallback, min, max) {
            let n = parseFloat(inputEl.value);
            if (isNaN(n)) n = fallback;
            n = Math.max(min, Math.min(max, n));
            return parseFloat(n.toFixed(2));
        }

        function getPrintableLayout(widthIn, heightIn) {
            const cols = Math.max(1, Math.floor(PRINTABLE_W_IN / widthIn));
            const rows = Math.max(1, Math.floor(PRINTABLE_H_IN / heightIn));
            return { cols, rows, cardsPerPage: cols * rows };
        }

        function updatePrintLayoutStyles() {
            const root = document.documentElement;
            root.style.setProperty('--card-w', cardWidthIn + 'in');
            root.style.setProperty('--card-h', cardHeightIn + 'in');
            root.style.setProperty('--card-ratio', (cardWidthIn / cardHeightIn).toString());
            root.style.setProperty('--print-cols', printableLayout.cols.toString());
        }

        function updatePageBreakMarkers() {
            const items = gridContainer.querySelectorAll('.grid-item');
            items.forEach(function (item, index) {
                item.classList.remove('page-break');
                if ((index + 1) % printableLayout.cardsPerPage === 0 && index < items.length - 1) {
                    item.classList.add('page-break');
                }
            });
        }

        function updateFitInfo() {
            const pages = Math.ceil(SLOTS / printableLayout.cardsPerPage);
            fitInfo.textContent =
                printableLayout.cols + ' x ' + printableLayout.rows + ' cards/page at ' +
                cardWidthIn.toFixed(2) + ' x ' + cardHeightIn.toFixed(2) +
                ' in (' + printableLayout.cardsPerPage + '/page, ~' + pages + ' page(s) for 9 cards, max-fit mode)';
        }

        function applyCardSize(widthIn, heightIn, syncPreset) {
            cardWidthIn = widthIn;
            cardHeightIn = heightIn;
            printableLayout = getPrintableLayout(cardWidthIn, cardHeightIn);
            updatePrintLayoutStyles();
            updatePageBreakMarkers();
            updateFitInfo();

            if (syncPreset) {
                const presetValue = cardWidthIn + 'x' + cardHeightIn;
                const exists = Array.from(sizePreset.options).some(function (opt) {
                    return opt.value === presetValue;
                });
                sizePreset.value = exists ? presetValue : 'custom';
            }
        }

        function syncBleedMode() {
            gridContainer.classList.remove('trim-bleed', 'no-bleed');
            gridContainer.classList.add(cardHasBleed ? 'trim-bleed' : 'no-bleed');
            if (bleedToggleBtn) {
                bleedToggleBtn.setAttribute('aria-pressed', cardHasBleed ? 'true' : 'false');
                bleedToggleBtn.textContent = cardHasBleed ? 'Bleed: yes' : 'Bleed: no';
            }
        }

        function getCardBackgroundSizeForCapture() {
            return cardHasBleed ? '110% auto' : 'cover';
        }

        function readFileAsDataURL(file) {
            return new Promise(function (resolve, reject) {
                const reader = new FileReader();
                reader.onload = function () { resolve(reader.result); };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function setGridFromUrls(urls, repeat) {
            const items = gridContainer.querySelectorAll('.grid-item');
            for (let i = 0; i < SLOTS; i++) {
                const item = items[i];
                if (repeat) {
                    const url = urls[i % urls.length];
                    item.classList.remove('empty');
                    item.style.backgroundImage = 'url(' + url + ')';
                } else if (i < urls.length) {
                    item.classList.remove('empty');
                    item.style.backgroundImage = 'url(' + urls[i] + ')';
                } else {
                    item.classList.add('empty');
                    item.style.backgroundImage = '';
                }
            }
            updatePageBreakMarkers();
        }

        function ensureSlots() {
            const current = gridContainer.querySelectorAll('.grid-item').length;
            gridContainer.innerHTML = '';
            for (let i = 0; i < SLOTS; i++) {
                const div = document.createElement('div');
                div.className = 'grid-item empty';
                div.dataset.index = i + 1;
                gridContainer.appendChild(div);
            }
        }

        ensureSlots();
        syncBleedMode();
        applyCardSize(cardWidthIn, cardHeightIn, true);

        sizePreset.addEventListener('change', function () {
            if (this.value === 'custom') return;
            const parts = this.value.split('x');
            if (parts.length !== 2) return;
            const w = parseFloat(parts[0]);
            const h = parseFloat(parts[1]);
            if (!isNaN(w) && !isNaN(h)) {
                cardWidthInInput.value = w.toFixed(2).replace(/\.00$/, '');
                cardHeightInInput.value = h.toFixed(2).replace(/\.00$/, '');
                applyCardSize(w, h, false);
            }
        });

        function onCustomSizeInput() {
            const w = getNumericInputValue(cardWidthInInput, 2.5, 1, 8);
            const h = getNumericInputValue(cardHeightInInput, 3.5, 1, 10);
            cardWidthInInput.value = w;
            cardHeightInInput.value = h;
            applyCardSize(w, h, true);
        }

        cardWidthInInput.addEventListener('input', onCustomSizeInput);
        cardHeightInInput.addEventListener('input', onCustomSizeInput);

        bleedToggleBtn.addEventListener('click', function () {
            cardHasBleed = !cardHasBleed;
            syncBleedMode();
            updatePageBreakMarkers();
        });

        fileUpload.addEventListener('change', function () {
            const files = Array.from(this.files).slice(0, SLOTS);
            if (files.length === 0) {
                uploadedUrls = [];
                repeatBtn.disabled = true;
                return;
            }
            Promise.all(files.map(readFileAsDataURL)).then(function (urls) {
                uploadedUrls = urls;
                repeatBtn.disabled = false;
                setGridFromUrls(uploadedUrls, false);
            }).catch(function () {
                uploadedUrls = [];
                repeatBtn.disabled = true;
                alert('Could not read one or more files.');
            });
        });

        repeatBtn.addEventListener('click', function () {
            if (uploadedUrls.length === 0) {
                alert('Upload at least one image first.');
                return;
            }
            setGridFromUrls(uploadedUrls, true);
        });

        printBtn.addEventListener('click', function () {
            window.print();
        });

        downloadPdfBtn.addEventListener('click', function () {
            const items = gridContainer.querySelectorAll('.grid-item');
            const hasAny = Array.from(items).some(el => el.style.backgroundImage && el.style.backgroundImage !== 'none');
            if (!hasAny) {
                alert('Upload at least one card image first.');
                return;
            }
            downloadPdfBtn.disabled = true;
            downloadPdfBtn.textContent = 'Creating PDF…';

            const CARD_W_IN = cardWidthIn;
            const CARD_H_IN = cardHeightIn;
            const COLS = printableLayout.cols;
            const PER_PAGE = printableLayout.cardsPerPage;
            const INCLUDE_BACKS = duplexBacksToggle.checked;
            const TRIM_MARGIN = 0.125;

            var DPI = 400;
            function captureCard(el) {
                var w = Math.round(CARD_W_IN * DPI);
                var h = Math.round(CARD_H_IN * DPI);
                var scale = 2;
                var wrap = document.createElement('div');
                wrap.style.cssText = 'position:absolute;left:-9999px;width:' + w + 'px;height:' + h + 'px;overflow:hidden;';
                var clone = el.cloneNode(true);
                clone.style.width = w + 'px';
                clone.style.height = h + 'px';
                clone.style.backgroundSize = getCardBackgroundSizeForCapture();
                clone.style.backgroundPosition = 'center';
                clone.style.overflow = 'hidden';
                clone.style.borderRadius = '0';
                wrap.appendChild(clone);
                document.body.appendChild(wrap);
                return html2canvas(clone, {
                    scale: scale,
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: '#ffffff',
                    logging: false,
                    width: w,
                    height: h
                }).then(function (canvas) {
                    document.body.removeChild(wrap);
                    return canvas.toDataURL('image/png');
                });
            }

            const promises = Array.from(items).map(captureCard);
            Promise.all(promises).then(function (images) {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: 'portrait',
                    unit: 'in',
                    format: 'letter'
                });
                function drawCropMarks(x, y, w, h) {
                    const m = TRIM_MARGIN;
                    const mk = 0.09;
                    pdf.setDrawColor(0, 0, 0);
                    pdf.setLineWidth(0.005);
                    pdf.line(x - m, y - m, x - m + mk, y - m);
                    pdf.line(x - m, y - m, x - m, y - m + mk);
                    pdf.line(x + w + m, y - m, x + w + m - mk, y - m);
                    pdf.line(x + w + m, y - m, x + w + m, y - m + mk);
                    pdf.line(x - m, y + h + m, x - m + mk, y + h + m);
                    pdf.line(x - m, y + h + m, x - m, y + h + m - mk);
                    pdf.line(x + w + m, y + h + m, x + w + m - mk, y + h + m);
                    pdf.line(x + w + m, y + h + m, x + w + m, y + h + m - mk);
                }
                const rowsPerPage = printableLayout.rows;
                const pageUsedWidth = COLS * CARD_W_IN;
                const pageUsedHeight = rowsPerPage * CARD_H_IN;
                const pageOffsetX = Math.max(0, (PAGE_W_IN - pageUsedWidth) / 2);
                const pageOffsetY = Math.max(0, (PAGE_H_IN - pageUsedHeight) / 2);
                for (let i = 0; i < images.length; i++) {
                    if (i > 0 && i % PER_PAGE === 0) {
                        pdf.addPage('letter', 'portrait');
                    }
                    const indexInPage = i % PER_PAGE;
                    const col = indexInPage % COLS;
                    const row = Math.floor(indexInPage / COLS);
                    const x = pageOffsetX + MARGIN_X + col * CARD_W_IN;
                    const y = pageOffsetY + MARGIN_Y + row * CARD_H_IN;
                    pdf.addImage(images[i], 'PNG', x, y, CARD_W_IN, CARD_H_IN);
                    drawCropMarks(x, y, CARD_W_IN, CARD_H_IN);
                }
                if (INCLUDE_BACKS) {
                    const backPages = Math.ceil(images.length / PER_PAGE);
                    for (let pageIdx = 0; pageIdx < backPages; pageIdx++) {
                        pdf.addPage('letter', 'portrait');
                        for (let k = 0; k < PER_PAGE; k++) {
                            const absolute = pageIdx * PER_PAGE + k;
                            if (absolute >= images.length) break;
                            const col = (COLS - 1) - (k % COLS);
                            const row = Math.floor(k / COLS);
                            const x = pageOffsetX + MARGIN_X + col * CARD_W_IN;
                            const y = pageOffsetY + MARGIN_Y + row * CARD_H_IN;
                            pdf.setFillColor(255, 255, 255);
                            pdf.rect(x, y, CARD_W_IN, CARD_H_IN, 'F');
                            pdf.setDrawColor(160, 160, 160);
                            pdf.rect(x, y, CARD_W_IN, CARD_H_IN);
                            pdf.setTextColor(100, 100, 100);
                            pdf.setFontSize(10);
                            pdf.text('BACK ' + (absolute + 1), x + CARD_W_IN / 2, y + CARD_H_IN / 2, { align: 'center' });
                            drawCropMarks(x, y, CARD_W_IN, CARD_H_IN);
                        }
                    }
                }
                pdf.save('card-grid.pdf');
                downloadPdfBtn.disabled = false;
                downloadPdfBtn.textContent = 'Print-Ready PDF';
            }).catch(function () {
                alert('Could not create PDF. Try "Print / Save as PDF" instead.');
                downloadPdfBtn.disabled = false;
                downloadPdfBtn.textContent = 'Print-Ready PDF';
            });
        });
    </script>
</body>
</html>
