<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Grid – Print 9 Cards</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 1rem;
            background: #f0f0f0;
        }
        h1 { margin-top: 0; }
        .controls {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .controls label {
            padding: 0.5rem 1rem;
            background: #333;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
        }
        .controls input[type="file"] { display: none; }
        .controls button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-print { background: #2c7; color: #fff; }
        .btn-pdf { background: #07c; color: #fff; }
        .btn-print:hover, .btn-pdf:hover { opacity: 0.9; }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            background: #fff;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .grid-item {
            aspect-ratio: 2.5 / 3.5;
            border: 1px solid #ccc;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #eee;
            background-size: cover;
            background-position: center;
        }
        .grid-item.empty::before {
            content: 'Card ' attr(data-index);
            color: #999;
            font-size: 0.9rem;
        }
        .no-print { margin-bottom: 0.5rem; }

        @media print {
            @page {
                size: letter;
                margin: 0.25in;
            }
            html, body {
                margin: 0;
                padding: 0;
                background: #fff;
                max-width: none;
            }
            body { padding: 0 !important; }
            .no-print { display: none !important; }
            .grid-container {
                gap: 0;
                padding: 0;
                margin: 0 auto;
                box-shadow: none;
                border-radius: 0;
                width: 7.5in;
                height: 10.5in;
                grid-template-columns: repeat(3, 2.5in);
                grid-template-rows: repeat(3, 3.5in);
            }
            .grid-item {
                width: 2.5in;
                height: 3.5in;
                border: 1px solid #ccc;
                border-radius: 0;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>
    <h1 class="no-print">Upload 9 Cards</h1>
    <div class="controls no-print">
        <label for="fileUpload">Choose images (up to 9)</label>
        <input type="file" id="fileUpload" accept="image/*" multiple>
        <button type="button" class="btn-print" id="printBtn">Print / Save as PDF</button>
        <button type="button" class="btn-pdf" id="downloadPdfBtn">Download PDF</button>
    </div>
    <div class="grid-container" id="gridContainer"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        const fileUpload = document.getElementById('fileUpload');
        const gridContainer = document.getElementById('gridContainer');
        const printBtn = document.getElementById('printBtn');
        const downloadPdfBtn = document.getElementById('downloadPdfBtn');
        const SLOTS = 9;

        function ensureSlots() {
            const current = gridContainer.querySelectorAll('.grid-item').length;
            gridContainer.innerHTML = '';
            for (let i = 0; i < SLOTS; i++) {
                const div = document.createElement('div');
                div.className = 'grid-item empty';
                div.dataset.index = i + 1;
                gridContainer.appendChild(div);
            }
        }

        ensureSlots();

        fileUpload.addEventListener('change', function () {
            const files = Array.from(this.files).slice(0, SLOTS);
            const items = gridContainer.querySelectorAll('.grid-item');
            files.forEach((file, i) => {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const item = items[i];
                    item.classList.remove('empty');
                    item.style.backgroundImage = `url(${e.target.result})`;
                    item.style.backgroundSize = 'cover';
                    item.style.backgroundPosition = 'center';
                };
                reader.readAsDataURL(file);
            });
            for (let i = files.length; i < SLOTS; i++) {
                const item = items[i];
                item.classList.add('empty');
                item.style.backgroundImage = '';
            }
        });

        printBtn.addEventListener('click', function () {
            window.print();
        });

        downloadPdfBtn.addEventListener('click', function () {
            const items = gridContainer.querySelectorAll('.grid-item');
            const hasAny = Array.from(items).some(el => el.style.backgroundImage && el.style.backgroundImage !== 'none');
            if (!hasAny) {
                alert('Upload at least one card image first.');
                return;
            }
            downloadPdfBtn.disabled = true;
            downloadPdfBtn.textContent = 'Creating PDF…';

            const CARD_W_IN = 2.5;
            const CARD_H_IN = 3.5;
            const COLS = 3;
            const ROWS = 3;
            const MARGIN_X = 0.5;
            const MARGIN_Y = 0.25;

            var DPI = 400;
            function captureCard(el) {
                var w = Math.round(CARD_W_IN * DPI);
                var h = Math.round(CARD_H_IN * DPI);
                var scale = 2;
                var wrap = document.createElement('div');
                wrap.style.cssText = 'position:absolute;left:-9999px;width:' + w + 'px;height:' + h + 'px;overflow:hidden;';
                var clone = el.cloneNode(true);
                clone.style.width = w + 'px';
                clone.style.height = h + 'px';
                clone.style.backgroundSize = 'cover';
                clone.style.backgroundPosition = 'center';
                clone.style.borderRadius = '0';
                wrap.appendChild(clone);
                document.body.appendChild(wrap);
                return html2canvas(clone, {
                    scale: scale,
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: '#ffffff',
                    logging: false,
                    width: w,
                    height: h
                }).then(function (canvas) {
                    document.body.removeChild(wrap);
                    return canvas.toDataURL('image/png');
                });
            }

            const promises = Array.from(items).map(captureCard);
            Promise.all(promises).then(function (images) {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: 'portrait',
                    unit: 'in',
                    format: 'letter'
                });
                for (let i = 0; i < images.length; i++) {
                    const col = i % COLS;
                    const row = Math.floor(i / COLS);
                    const x = MARGIN_X + col * CARD_W_IN;
                    const y = MARGIN_Y + row * CARD_H_IN;
                    pdf.addImage(images[i], 'PNG', x, y, CARD_W_IN, CARD_H_IN);
                }
                pdf.save('card-grid.pdf');
                downloadPdfBtn.disabled = false;
                downloadPdfBtn.textContent = 'Download PDF';
            }).catch(function () {
                alert('Could not create PDF. Try "Print / Save as PDF" instead.');
                downloadPdfBtn.disabled = false;
                downloadPdfBtn.textContent = 'Download PDF';
            });
        });
    </script>
</body>
</html>
